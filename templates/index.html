<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

<h1>❤️ Heart Disease Prediction</h1>

<form action="/predict" method="POST">

<label>Age</label>
<input type="number" name="Age" required>

<label>Gender</label>
<select name="Sex">
<option value="M">Male</option>
<option value="F">Female</option>
</select>

<label>Chest Pain Type</label>
<select name="ChestPainType">
<option value="ATA">ATA</option>
<option value="NAP">NAP</option>
<option value="TA">TA</option>
<option value="ASY">ASY</option>
</select>

<label>Resting Blood Pressure</label>
<input type="number" name="RestingBP" required>

<label>Cholesterol</label>
<input type="number" name="Cholesterol" required>

<label>Fasting Blood Sugar</label>
<select name="FastingBS">
<option value="0">No</option>
<option value="1">Yes</option>
</select>

<label>Resting ECG</label>
<select name="RestingECG">
<option value="Normal">Normal</option>
<option value="ST">ST</option>
<option value="LVH">LVH</option>
</select>

<label>Maximum Heart Rate</label>
<input type="number" name="MaxHR" required>

<label>Exercise Angina</label>
<select name="ExerciseAngina">
<option value="N">No</option>
<option value="Y">Yes</option>
</select>

<label>Oldpeak</label>
<input type="number" step="0.1" name="Oldpeak">

<label>ST Slope</label>
<select name="ST_Slope">
<option value="Up">Up</option>
<option value="Flat">Flat</option>
<option value="Down">Down</option>
</select>

<br><br>

<button type="submit">Predict</button>

</form>

</div>

</body>
</html>
